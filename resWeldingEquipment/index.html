<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Реестр сварочного оборудования - Hermes-Ural</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/admin.css" />
    <link rel="stylesheet" href="../css/registry-common.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .registry-table th:first-child,
      .registry-table td:first-child {
        min-width: 120px;
      } /* Способ сварки */
      .registry-table th:nth-child(2),
      .registry-table td:nth-child(2) {
        min-width: 200px;
      } /* Наименование */
      .registry-table th:nth-child(3),
      .registry-table td:nth-child(3) {
        min-width: 150px;
      } /* Зав. номер */
      .registry-table th:nth-child(4),
      .registry-table td:nth-child(4) {
        min-width: 150px;
      } /* Сертификат НАКС */
      .registry-table th:nth-child(5),
      .registry-table td:nth-child(5) {
        min-width: 110px;
      } /* Срок действия */
    </style>
  </head>
  <body class="registry-container">
    <!-- Кнопка мобильного меню -->
    <button class="mobile-menu-toggle" id="mobileMenuToggle" onclick="toggleMobileMenu()">
      <i class="fas fa-bars"></i>
    </button>
    
    <!-- Оверлей для мобильного меню -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileMenu()"></div>

    <div class="admin-container">
      <div class="admin-sidebar">
        <div class="sidebar-header">
          <h2><i class="fas fa-robot"></i> Оборудование</h2>
        </div>
        <div class="sidebar-nav">
          <button
            class="nav-btn active"
            onclick="window.registryCommon.showSection('list')"
          >
            <i class="fas fa-list"></i> Список
          </button>
        </div>
      </div>

      <div class="admin-main">
        <div class="admin-header">
          <div class="header-left">
            <h1><i class="fas fa-robot"></i> Реестр сварочного оборудования</h1>
          </div>
          <div class="header-actions">
            <button
              onclick="window.location.href = '../index.html'"
              class="action-btn back-btn"
            >
              <i class="fas fa-arrow-left"></i> На главную
            </button>
          </div>
        </div>

        <div class="admin-content">
          <div id="list-section" class="hidden-section active">
            <div
              style="
                display: flex;
                gap: 15px;
                margin-bottom: 20px;
                align-items: center;
              "
            >
              <input
                type="text"
                id="searchInput"
                placeholder="Поиск по наименованию или способу"
                class="form-control"
                style="max-width: 300px"
              />
              <button id="resetSearchBtn" class="btn-secondary">Сброс</button>
              <button
                id="generatePdfBtn"
                class="btn-primary"
                style="
                  background: linear-gradient(135deg, #27ae60, #219653);
                  margin-left: auto;
                "
              >
                <i class="fas fa-file-pdf"></i> Скачать PDF
              </button>
            </div>

            <div class="table-container">
              <div class="table-header">
                <h2><i class="fas fa-table"></i> Сварочное оборудование</h2>
                <div id="resultsCount" style="color: #4a5568; font-weight: 600">
                  Записей: 0
                </div>
              </div>
              <div class="table-responsive">
                <table class="registry-table">
                  <thead>
                    <tr>
                      <th>Способ сварки</th>
                      <th>Наименование</th>
                      <th>Зав. номер</th>
                      <th>Сертификат НАКС</th>
                      <th>Срок действия</th>
                    </tr>
                  </thead>
                  <tbody id="tableBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="../config/spreadsheet-config.js"></script>
    <script src="../js/registry-common.js"></script>
    <script src="app.js"></script>
  </body>
</html>
