<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Реестр технологии сварки - Hermes-Ural</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/admin.css" />
    <link rel="stylesheet" href="../css/registry-common.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .registry-table th:first-child,
      .registry-table td:first-child {
        min-width: 100px;
      } /* Сертификат */
      .registry-table th:nth-child(2),
      .registry-table td:nth-child(2) {
        min-width: 80px;
      } /* Группа (аббревиатура) */
      .registry-table th:nth-child(3),
      .registry-table td:nth-child(3) {
        min-width: 150px;
      } /* Группа */
      .registry-table th:nth-child(4),
      .registry-table td:nth-child(4) {
        min-width: 100px;
      } /* Действует до */
      .registry-table th:nth-child(5),
      .registry-table td:nth-child(5) {
        min-width: 120px;
      } /* Материал */
      .registry-table th:nth-child(6),
      .registry-table td:nth-child(6) {
        min-width: 120px;
      } /* Комментарий */

      /* Мобильная адаптация */
      @media (max-width: 768px) {
        .registry-table th,
        .registry-table td {
          min-width: auto !important;
        }
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  </head>
  <body class="registry-container">
    <!-- Кнопка мобильного меню -->
    <button
      class="mobile-menu-toggle"
      id="mobileMenuToggle"
      onclick="toggleMobileMenu()"
    >
      <i class="fas fa-bars"></i>
    </button>

    <!-- Оверлей для мобильного меню -->
    <div
      class="sidebar-overlay"
      id="sidebarOverlay"
      onclick="toggleMobileMenu()"
    ></div>

    <div class="admin-container">
      <div class="admin-sidebar">
        <div class="sidebar-header">
          <h2><i class="fas fa-cogs"></i> Техпроцессы</h2>
        </div>
        <div class="sidebar-nav">
          <button class="nav-btn active" onclick="showSection('select')">
            <i class="fas fa-search"></i> Поиск
          </button>
          <button class="nav-btn" onclick="showSection('results')">
            <i class="fas fa-table"></i> Результаты
          </button>
        </div>
      </div>

      <div class="admin-main">
        <div class="admin-header">
          <div class="header-left">
            <h1>
              <i class="fas fa-cogs"></i> Реестр технологии сварки (Техпроцессы)
            </h1>
          </div>
          <div class="header-actions">
            <button
              onclick="window.location.href = '../index.html'"
              class="action-btn back-btn"
            >
              <i class="fas fa-arrow-left"></i> На главную
            </button>
          </div>
        </div>

        <div class="admin-content">
          <!-- Экран выбора -->
          <div id="select-section" class="selection-card">
            <h2><i class="fas fa-filter"></i> Выберите тип сварки</h2>

            <div class="form-group">
              <label>Тип сварки:</label>
              <select id="weldingType" class="form-control">
                <option value="">-- Выберите --</option>
                <option value="Ручная дуговая сварка">
                  РД (Ручная дуговая сварка)
                </option>
                <option value="Ручная аргонодуговая сварка">
                  РАД (Ручная аргонодуговая сварка)
                </option>
                <option value="Полуавтоматическая сварка">
                  МП (Полуавтоматическая сварка)
                </option>
                <option value="Автоматическая сварка под слоем флюса">
                  АФ (Автоматическая сварка под слоем флюса)
                </option>
              </select>
            </div>

            <button id="confirmBtn" class="btn-primary">
              <i class="fas fa-search"></i> Показать техпроцессы
            </button>
          </div>

          <!-- Экран результатов -->
          <div id="results-section" class="hidden">
            <div class="table-container">
              <div class="table-header">
                <h2>
                  <i class="fas fa-table"></i> Технологические процессы сварки
                </h2>
                <button
                  class="btn-secondary"
                  onclick="window.registryCommon.showSection('select')"
                >
                  <i class="fas fa-arrow-left"></i> Назад к поиску
                </button>
                <button
                  id="generatePdfBtn"
                  class="btn-primary"
                  style="background: linear-gradient(135deg, #27ae60, #219653)"
                >
                  <i class="fas fa-file-pdf"></i> Скачать PDF
                </button>
              </div>

              <div class="table-responsive">
                <table class="registry-table">
                  <thead>
                    <tr>
                      <th>Сертификат</th>
                      <th>Группа (аббревиатура)</th>
                      <th>Группа</th>
                      <th>Действует до</th>
                      <th>Материал</th>
                      <th>Комментарий</th>
                    </tr>
                  </thead>
                  <tbody id="tableBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="../js/data-manager.js"></script>
    <script src="../config/spreadsheet-config.js"></script>
    <script src="../js/registry-common.js"></script>
    <script src="app.js"></script>

    <!-- Регистрация Service Worker -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", async () => {
          try {
            await navigator.serviceWorker.register("../sw.js");
          } catch (error) {
            console.error("Ошибка регистрации Service Worker:", error);
          }
        });
      }
    </script>
  </body>
</html>
